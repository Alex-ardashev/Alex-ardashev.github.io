<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Guide - Aleksei Ardashev</title>
    <link href="https://fonts.googleapis.com/css?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0a0a0a;
            --secondary-color: #2c2c2c;
            --accent-color: #2563eb;
            --bg-color: #ffffff;
            --text-color: #0a0a0a;
            --text-secondary: #525252;
            --border-color: #e5e5e5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            color: var(--text-color);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .product-container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-color);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .price {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 30px;
        }

        .buy-button {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .buy-button:hover {
            background: #1e40af;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            margin-top: 30px;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="product-container">
        <h1>Dubai Guide</h1>
        <p>A comprehensive, insider's guide to navigating and thriving in Dubai. Whether you are moving here for work,
            visiting for a strategic business trip, or exploring investment opportunities, this guide provides all the
            essential knowledge you need.</p>
        <div class="price">$50.00</div>

        <!-- Live Link will be injected here during build, or we rely on config.json mapping. Since this is a standalone dummy page, we can inject the Stripe Link from the config. -->
        <a href="#" id="buy-button" class="buy-button">Buy Now</a>

        <a href="index.html" class="back-link">&larr; Back to Home</a>
    </div>

    <script>
        // Fetch the config to get the correct payment link
        fetch('config.json')
            .then(res => res.json())
            .then(data => {
                const product = data.products.find(p => p.id === 'dubai-guide');
                if (product && product.links) {
                    // Default to live link for deployment
                    document.getElementById('buy-button').href = product.links.live;
                }
            });
    </script>
</body>

</html>
